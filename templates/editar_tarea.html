<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar tarea</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@4.5.2/dist/minty/bootstrap.min.css">
</head>
<body>
    <main class="container p-4">
        <h1 class="display-3 text-center mp-4 titulo">Editar Tarea</h1>
        <div class="row">
            <div class="col-md-4 offset-md-4 my-auto">
                <div class="card">
                    <div class="card-header">
                        <form action="{{ url_for('actualizar', id=tarea.id) }}" method="POST">
                            <div class="form-group">
                                <input type="text" name="contenido-tarea" value="{{ tarea.contenido }}" class="form-control" required>
                            </div>
                            <div class="form-group mt-2">
                                <input type="text" name="categoria-tarea" value="{{ tarea.categoria or '' }}" class="form-control" placeholder="Categoría">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block mt-2">Guardar cambios</button>
                        </form>
                    </div>
                    <div class="card-body text-center">
                        <a href="{{ url_for('home') }}" class="btn btn-secondary">Volver</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
